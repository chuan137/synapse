<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S-Deck — Synapse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #252830;
      --text: #a8aab4;
      --muted: #52575f;
      --accent: #4068d4;
    }

    :root.bright {
      --bg: #e8eaed;
      --surface: #f2f3f5;
      --border: #cdd0d6;
      --text: #1a1d24;
      --muted: #8890a0;
      --accent: #3b6ef0;
      --idle:    #16a34a;
      --working: #d97706;
      --blocked: #ea580c;
      --error:   #dc2626;
      --p0: #dc2626;
      --p0-bg: #fef2f2;
    }

    :root {

      --idle:    #4ade80;
      --working: #facc15;
      --blocked: #fb923c;
      --error:   #f87171;

      --p0: #ef4444;
      --p0-bg: #2a1212;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .logo span { color: var(--muted); font-weight: 400; }

    .project-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      padding: 2px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--idle);
      box-shadow: 0 0 6px var(--idle);
      animation: pulse 2s infinite;
      margin-left: auto;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .dot-label { color: var(--muted); font-size: 11px; }

    /* ── Layout ── */
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: auto 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #approvals-panel  { grid-column: 1 / -1; grid-row: 1; }
    #agents-panel     { grid-column: 1;       grid-row: 2; min-height: 0; }
    #messages-panel   { grid-column: 2;       grid-row: 2; min-height: 0; }

    /* ── Approvals ── */
    #approvals-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: #1a1208;
    }

    #approvals-panel.visible { display: flex; }

    .approval-card {
      background: #2a1e08;
      border: 1px solid #f59e0b;
      border-radius: 6px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .approval-question {
      font-size: 13px;
      font-weight: 600;
      color: #fcd34d;
    }

    .approval-context {
      font-size: 11px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .approval-meta {
      font-size: 10px;
      color: var(--muted);
    }

    .approval-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .approval-comment {
      flex: 1;
      font-size: 11px;
      height: 28px;
      padding: 4px 8px;
    }

    .btn-approve {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-reject {
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Agents panel ── */
    #agents-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #agents-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      transition: border-color 0.2s, opacity 0.2s;
      cursor: default;
    }

    .agent-card:hover { border-color: var(--accent); cursor: pointer; }
    .agent-card.stale { opacity: 0.4; }
    .agent-card.selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--surface)); }

    .agent-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ping-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      align-self: auto;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .ping-btn:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
    .ping-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .agent-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .agent-session {
      font-size: 10px;
      color: var(--muted);
      font-family: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 32px 16px;
    }

    /* ── Messages panel ── */
    #messages-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* ── Compose (inside messages panel) ── */
    #compose {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 16px;
    }

    .message-row {
      display: flex;
      flex-direction: row;
      gap: 10px;
      align-items: flex-start;
      padding: 6px 8px;
      border-radius: 6px;
    }

    .message-row.from-human {
      background: rgba(79, 126, 248, 0.08);
    }

    .message-row.from-agent {
      background: rgba(255, 255, 255, 0.02);
    }

    .message-row:hover { filter: brightness(1.15); }

    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .from-human .message-avatar {
      background: var(--accent);
      color: #fff;
    }

    .from-agent .message-avatar {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .from-agent.p0 .message-avatar {
      border-color: var(--p0);
      color: var(--p0);
    }

    .message-body {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .message-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .message-time {
      font-size: 10px;
      color: var(--muted);
    }

    .message-content {
      font-size: 12px;
      color: var(--text);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .from-agent.p0 .message-content { color: #fca5a5; }

input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      border-radius: 4px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }

    select option { background: var(--bg); }

    #msg-input  { width: 100%; resize: none; height: 38px; max-height: 180px; overflow-y: auto; }
    #msg-input:disabled { opacity: 0.4; cursor: not-allowed; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 7px 18px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">S-Deck <span>/ Synapse</span></div>
  <div class="project-name" id="project-name">—</div>
  <div class="dot-label" id="conn-label">connecting…</div>
  <div class="dot" id="conn-dot" style="background: var(--muted); box-shadow: none;"></div>
  <button id="theme-btn" style="background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:inherit;" title="Toggle theme">☀</button>
</header>

<main>
  <!-- Approvals -->
  <div id="approvals-panel">
  </div>

  <!-- Agents -->
  <section id="agents-panel">
    <div class="panel-header">Agents</div>
    <div id="agents-list">
      <div class="empty-state">No agents connected yet.</div>
    </div>
  </section>

  <!-- Messages -->
  <section id="messages-panel">
    <div class="panel-header" id="messages-header">Messages</div>
    <div id="messages-list">
      <div class="empty-state" id="empty-msgs">No messages yet.</div>
    </div>
    <div id="compose">
      <textarea id="msg-input" placeholder="Select an agent… ⌘↵ send · ⌘⇧↵ urgent" disabled></textarea>
    </div>
  </section>
</main>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let agentStatuses    = [];
  let allMessages      = [];
  let pendingApprovals = [];
  let selectedAgentId  = null;

  // ── Theme ────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  const bright = localStorage.getItem('sdeck-theme') === 'bright';
  if (bright) document.documentElement.classList.add('bright');
  themeBtn.textContent = bright ? '☾' : '☀';
  themeBtn.addEventListener('click', () => {
    const isBright = document.documentElement.classList.toggle('bright');
    localStorage.setItem('sdeck-theme', isBright ? 'bright' : 'dark');
    themeBtn.textContent = isBright ? '☾' : '☀';
  });

  // ── Project info ──────────────────────────────────────────────────────────
  fetch('/api/info').then(r => r.json()).then(({ project, projectId }) => {
    const label = projectId ? `${project}  ·  ${projectId}` : project;
    document.getElementById('project-name').textContent = label;
    document.title = `S-Deck — ${project}`;
  });

  // ── SSE ──────────────────────────────────────────────────────────────────
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');

  function connect() {
    const es = new EventSource('/events');

    es.onopen = () => {
      dot.style.background = 'var(--idle)';
      dot.style.boxShadow  = '0 0 6px var(--idle)';
      label.textContent    = 'live';
    };

    es.onmessage = (e) => {
      const { statuses, messages, approvals } = JSON.parse(e.data);
      agentStatuses    = statuses;
      allMessages      = messages;
      pendingApprovals = approvals ?? [];
      renderAgents();
      renderMessages();
      renderApprovals();
    };

    es.onerror = () => {
      dot.style.background = 'var(--error)';
      dot.style.boxShadow  = 'none';
      label.textContent    = 'disconnected — retrying…';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();

  // ── Render approvals ─────────────────────────────────────────────────────
  const approvalsPanel = document.getElementById('approvals-panel');

  function renderApprovals() {
    if (pendingApprovals.length === 0) {
      approvalsPanel.classList.remove('visible');
      approvalsPanel.innerHTML = '';
      return;
    }
    approvalsPanel.classList.add('visible');
    approvalsPanel.innerHTML = pendingApprovals.map(a => `
      <div class="approval-card" data-approval-id="${a.id}">
        <div class="approval-question">⚠ ${esc(a.question)}</div>
        ${a.context ? `<div class="approval-context">${esc(a.context)}</div>` : ''}
        <div class="approval-meta">from ${esc(a.agent_id)} · ${new Date(a.created_at).toLocaleTimeString()}</div>
        <div class="approval-actions">
          <input class="approval-comment" type="text" placeholder="Optional comment…" />
          <button class="btn-approve" data-id="${a.id}">Approve</button>
          <button class="btn-reject" data-id="${a.id}">Reject</button>
        </div>
      </div>
    `).join('');

    approvalsPanel.querySelectorAll('.btn-approve, .btn-reject').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const status = btn.classList.contains('btn-approve') ? 'approved' : 'rejected';
        const comment = btn.closest('.approval-card').querySelector('.approval-comment').value.trim() || null;
        await fetch(`/api/approvals/${id}/resolve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status, comment }),
        });
      });
    });
  }

  // ── Render agents ─────────────────────────────────────────────────────────
  const agentsList = document.getElementById('agents-list');

  function timeAgo(ts) {
    const secs = Math.floor((Date.now() - ts) / 1000);
    if (secs < 5)   return 'just now';
    if (secs < 60)  return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    return `${Math.floor(secs/3600)}h ago`;
  }

  const STALE_MS = 5 * 60_000; // 5 minutes without update = stale

  function renderAgents() {
    if (agentStatuses.length === 0) {
      agentsList.innerHTML = '<div class="empty-state">No agents connected yet.</div>';
      return;
    }

    // Auto-select first agent if none selected
    if (!selectedAgentId && agentStatuses.length > 0) {
      selectedAgentId = agentStatuses[0].agent_id;
    }

    agentsList.innerHTML = agentStatuses.map(a => {
      const stale = (Date.now() - a.updated_at) > STALE_MS;
      const selected = a.agent_id === selectedAgentId;
      const cardClass = ['agent-card', stale ? 'stale' : '', selected ? 'selected' : ''].filter(Boolean).join(' ');
      const slot = `:${a.slot}`;
      const humanName = a.name && a.name !== a.agent_id ? esc(a.name) : '';
      const hasTmux = !!a.tmux_pane;
      const stateColor = { idle: 'var(--idle)', working: 'var(--working)', blocked: 'var(--blocked)', error: 'var(--error)' }[a.state] ?? 'var(--muted)';
      return `
        <div class="${cardClass}" data-agent-id="${esc(a.agent_id)}">
          <div class="agent-card-row">
            <div class="agent-name">${esc(slot)}${humanName ? `  <span style="color:var(--muted);font-weight:400;">${humanName}</span>` : ''}</div>
            <button class="ping-btn" data-ping-id="${esc(a.agent_id)}" ${hasTmux ? '' : 'disabled'} title="${hasTmux ? 'Nudge agent' : 'No tmux pane'}">ping</button>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
            <span style="width:7px;height:7px;border-radius:50%;background:${stateColor};flex-shrink:0;"></span>
            <span style="font-size:11px;color:${stateColor};font-weight:600;">${esc(a.state)}</span>
          </div>
        </div>
      `;
    }).join('');

    // Wire click handlers
    agentsList.querySelectorAll('.agent-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.ping-btn')) return;
        selectedAgentId = card.dataset.agentId;
        renderAgents();
        renderMessages();
      });
    });

    agentsList.querySelectorAll('.ping-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const agentId = btn.dataset.pingId;
        btn.disabled = true;
        btn.textContent = '…';
        await fetch(`/api/ping/${encodeURIComponent(agentId)}`, { method: 'POST' });
        setTimeout(() => { btn.disabled = false; btn.textContent = 'ping'; }, 1500);
      });
    });

    updateComposePlaceholder();
  }

  function updateComposePlaceholder() {
    const agent = agentStatuses.find(a => a.agent_id === selectedAgentId);
    const label = agent ? `:${agent.slot}` : null;
    msgInput.placeholder = label
      ? `Message to ${label}… ⌘↵ send · ⌘⇧↵ urgent`
      : 'Select an agent… ⌘↵ send · ⌘⇧↵ urgent';
    msgInput.disabled = !selectedAgentId;
  }

  // Re-render agents every 5s so timeAgo and stale state stay current
  setInterval(renderAgents, 5_000);

  // ── Render messages ───────────────────────────────────────────────────────
  const messagesList   = document.getElementById('messages-list');
  const messagesHeader = document.getElementById('messages-header');

  function renderMessages() {
    const selectedAgent = agentStatuses.find(a => a.agent_id === selectedAgentId);
    const slotLabel = selectedAgent != null ? `:${selectedAgent.slot}` : selectedAgentId;
    messagesHeader.textContent = slotLabel ? `Messages — ${slotLabel}` : 'Messages';

    const msgs = [...allMessages]
      .filter(m => m.from_id === 'human' || m.to_id === 'human')
      .filter(m => !selectedAgentId || m.from_id === selectedAgentId || m.to_id === selectedAgentId)
      .sort((a, b) => a.created_at - b.created_at);

    if (msgs.length === 0) {
      messagesList.innerHTML = '<div class="empty-state">No messages for this agent yet.</div>';
      return;
    }

    messagesList.innerHTML = msgs.map(m => {
      const isP0      = m.priority === 0;
      const fromHuman = m.from_id === 'human';
      const cls = [isP0 ? 'p0' : '', fromHuman ? 'from-human' : 'from-agent'].filter(Boolean).join(' ');
      const t = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const senderId = fromHuman ? 'human' : m.from_id;
      const agent = agentStatuses.find(a => a.agent_id === senderId);
      const senderLabel = fromHuman ? 'you' : (agent ? `:${agent.slot}${agent.name && agent.name !== agent.agent_id ? ' ' + agent.name : ''}` : senderId);
      const avatarLabel = fromHuman ? 'you' : (agent ? `:${agent.slot}` : senderId.slice(-3));
      const p0badge = isP0 ? ` <span style="font-size:10px;color:var(--p0);font-weight:700;">P0</span>` : '';
      return `
        <div class="message-row ${cls}">
          <div class="message-avatar">${esc(avatarLabel)}</div>
          <div class="message-body">
            <div class="message-header">
              ${p0badge}
              <span class="message-time">${t}</span>
            </div>
            <div class="message-content">${esc(m.content)}</div>
          </div>
        </div>
      `;
    }).join('');

    // Append current status at the bottom of the chat
    if (selectedAgent) {
      const stateColor = { idle: 'var(--idle)', working: 'var(--working)', blocked: 'var(--blocked)', error: 'var(--error)' }[selectedAgent.state] ?? 'var(--muted)';
      const task = selectedAgent.current_task ? esc(selectedAgent.current_task) : '';
      messagesList.innerHTML += `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0 2px;opacity:0.6;">
          <div style="flex:1;height:1px;background:var(--border);"></div>
          <span style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);white-space:nowrap;">
            <span style="width:5px;height:5px;border-radius:50%;background:${stateColor};"></span>
            <span style="color:${stateColor};">${esc(selectedAgent.state)}</span>
            ${task ? `<span>·</span><span>${task}</span>` : ''}
          </span>
          <div style="flex:1;height:1px;background:var(--border);"></div>
        </div>
      `;
    }

    // Scroll to bottom (newest)
    messagesList.scrollTop = messagesList.scrollHeight;
  }

  // ── Send message ──────────────────────────────────────────────────────────
  const msgInput = document.getElementById('msg-input');

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && !e.shiftKey) { e.preventDefault(); send(5); }
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && e.shiftKey)  { e.preventDefault(); send(0); }
  });
  msgInput.addEventListener('input', () => {
    msgInput.style.height = '38px';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 180) + 'px';
  });

  async function send(priority = 5) {
    if (!selectedAgentId) return;
    const content = msgInput.value.trim();

    if (!content) return;

    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to_id: selectedAgentId, content, priority }),
    });

    msgInput.value = '';
    msgInput.style.height = '38px';
  }

  // ── Utils ─────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
