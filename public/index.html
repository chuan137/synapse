<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S-Deck — Synapse</title>
  <!-- Markdown rendering for bus messages. marked parses, DOMPurify sanitizes
       (marked does NOT sanitize — untrusted agent/operator content is an XSS risk).
       Pinned to major versions so the CDN doesn't drift. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <!-- morphdom: in-place DOM diffing — keeps existing nodes stable across polls. Pinned @2. -->
  <script src="https://cdn.jsdelivr.net/npm/morphdom@2/dist/morphdom-umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #16181e;
      --surface: #1e2028;
      --border: #2e3240;
      --text: #c2c5cf;
      --muted: #6b7080;
      --accent: #4f7ef8;
    }

    :root.bright {
      --bg: #e8eaed;
      --surface: #f2f3f5;
      --border: #cdd0d6;
      --text: #1a1d24;
      --muted: #8890a0;
      --accent: #3b6ef0;
      --idle:    #16a34a;
      --working: #d97706;
      --blocked: #ea580c;
      --error:   #dc2626;
      --p0: #dc2626;
      --p0-bg: #fef2f2;
    }

    :root {

      --idle:    #4ade80;
      --working: #facc15;
      --blocked: #fb923c;
      --error:   #f87171;

      --p0: #ef4444;
      --p0-bg: #2a1212;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .logo span { color: var(--muted); font-weight: 400; }

    .project-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      padding: 2px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--idle);
      box-shadow: 0 0 6px var(--idle);
      animation: pulse 2s infinite;
      margin-left: auto;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .dot-label { color: var(--muted); font-size: 11px; }

    /* ── Layout ── */
    main {
      display: grid;
      grid-template-columns: 320px 1fr 360px;
      grid-template-rows: auto 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    #approvals-panel  { grid-column: 1 / -1; grid-row: 1; }
    #agents-panel     { grid-column: 1;       grid-row: 2; min-height: 0; }
    #messages-panel   { grid-column: 2;       grid-row: 2; min-height: 0; }
    #activity-panel   { grid-column: 3;       grid-row: 2; min-height: 0; }

    /* Activity collapse: smoothly animate the column to zero and fade the panel.
       No rail — reopening is the same toggle in the Messages header. */
    main { transition: grid-template-columns 0.22s ease; }
    main.activity-collapsed { grid-template-columns: 320px 1fr 0; }
    #activity-panel {
      transition: opacity 0.18s ease;
      min-width: 0;
    }
    main.activity-collapsed #activity-panel {
      opacity: 0;
      pointer-events: none;
    }

    /* Toggle buttons: quiet ghost buttons with a pure-CSS chevron.
       #activity-collapse (›) lives in the Activity header, shown when open.
       #activity-expand  (‹) lives in the Messages header, shown when collapsed. */
    .activity-toggle {
      background: none;
      border: none;
      width: 22px; height: 22px;
      padding: 0;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;      /* override global button{align-self:flex-end} */
      transition: background 0.15s;
      font-size: 0;
    }
    .activity-toggle:hover { background: var(--bg); }

    /* Collapse: a chevron (›) pointing toward the panel's edge — "tuck away".
       Pure-CSS square with two borders, rotated 45°; flexbox centers it. */
    #activity-collapse::before {
      content: "";
      width: 6px; height: 6px;
      border-top:   1.5px solid var(--muted);
      border-right: 1.5px solid var(--muted);
      transform: rotate(45deg);
      margin-left: -2px;       /* optical centering */
      transition: border-color 0.15s;
    }
    #activity-collapse:hover::before { border-color: var(--text); }

    /* Expand: a sidebar/panel icon — reads as "show the side panel" with no
       left/right ambiguity. A rounded rectangle with a divided right column. */
    #activity-expand::before {
      content: "";
      width: 15px; height: 12px;
      border: 1.5px solid var(--muted);
      border-radius: 2px;
      box-shadow: inset -4.5px 0 0 -3px var(--muted); /* the right "panel" divider */
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #activity-expand:hover::before {
      border-color: var(--text);
      box-shadow: inset -4.5px 0 0 -3px var(--text);
    }

    /* Visibility: one button per state. Open → collapse (in Activity);
       collapsed → expand (in Messages). */
    #activity-expand   { display: none; }
    main.activity-collapsed #activity-collapse { display: none; }
    main.activity-collapsed #activity-expand   { display: flex; }

    /* Auto-collapse on narrow viewports unless the user has chosen otherwise (JS handles persistence). */
    @media (max-width: 1100px) {
      main:not(.activity-expanded) { grid-template-columns: 320px 1fr 0; }
      main:not(.activity-expanded) #activity-panel    { opacity: 0; pointer-events: none; }
      main:not(.activity-expanded) #activity-collapse { display: none; }
      main:not(.activity-expanded) #activity-expand   { display: flex; }
    }

    /* ── Approvals ── */
    #approvals-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: #1a1208;
    }

    #approvals-panel.visible { display: flex; }

    .approval-card {
      background: #2a1e08;
      border: 1px solid #f59e0b;
      border-radius: 6px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .approval-question {
      font-size: 13px;
      font-weight: 600;
      color: #fcd34d;
    }

    .approval-context {
      font-size: 11px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .approval-meta {
      font-size: 10px;
      color: var(--muted);
    }

    .approval-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .approval-comment {
      flex: 1;
      font-size: 11px;
      height: 28px;
      padding: 4px 8px;
    }

    .btn-approve {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-reject {
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Agents panel ── */
    #agents-panel {
      border-right: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .panel-header {
      height: 41px;            /* uniform across panels (text + button rows align) */
      flex-shrink: 0;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #agents-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      transition: border-color 0.2s, opacity 0.2s;
      cursor: default;
    }

    .agent-card { cursor: pointer; }
    .agent-card:hover { border-color: var(--accent); }
    .agent-card.selected {
      border-color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .agent-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ping-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      align-self: auto;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .ping-btn:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
    .ping-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .focus-btn, .cfg-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .focus-btn:hover, .cfg-btn:hover { border-color: var(--accent); color: var(--accent); }
    .focus-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Agent config modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-backdrop.hidden { display: none; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px 28px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }
    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .modal-field label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .modal-field input,
    .modal-field select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-field input:focus,
    .modal-field select:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }
    .modal-actions button {
      font-family: inherit;
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s;
    }
    .modal-actions button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .modal-actions button:hover:not(.primary) { border-color: var(--accent); color: var(--accent); }
    .modal-actions button.primary:hover { opacity: 0.88; }

    .agent-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .agent-session {
      font-size: 10px;
      color: var(--muted);
      font-family: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 32px 16px;
    }

    /* ── Activity panel ── */
    #activity-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      border-left: 2px solid var(--border);
    }

    #activity-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .activity-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .activity-row:hover { background: var(--surface); }
    .activity-time { color: var(--muted); font-size: 10px; flex-shrink: 0; }
    .activity-tool { font-weight: 600; color: var(--text); flex-shrink: 0; }
    .activity-detail {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .activity-dur { color: var(--muted); font-size: 10px; flex-shrink: 0; }
    .activity-row.err .activity-tool { color: var(--error); }
    .activity-row.err::before { content: '✗'; color: var(--error); flex-shrink: 0; }
    .activity-row.ok::before  { content: '·'; color: var(--idle);  flex-shrink: 0; }
    .activity-row.evt::before { content: '◇'; color: var(--accent); flex-shrink: 0; }

    /* ── Activity status ticker (shown in Messages header when activity panel is collapsed) ── */
    .header-status-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      min-width: 0;
    }
    #activity-latest-flash {
      display: none;
      font-size: 11px;
      color: var(--muted);
      max-width: 380px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      text-transform: lowercase;
    }
    main.activity-collapsed #activity-latest-flash:not(:empty) {
      display: inline-block;
    }

    /* Per-agent tool metric chips (inside agent cards) */
    .agent-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }
    .metric-chip {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .metric-chip b { color: var(--text); font-weight: 600; }
    .metric-chip.has-err { border-color: var(--error); color: var(--error); }

    /* ── Messages panel ── */
    #messages-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    #messages-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* ── Compose (inside messages panel) ── */
    #compose {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 16px;
    }

    .message-row {
      display: flex;
      flex-direction: row;
      gap: 10px;
      align-items: flex-start;
      padding: 6px 8px;
      border-radius: 6px;
    }

    .message-row.from-human {
      background: rgba(79, 126, 248, 0.08);
    }

    .message-row.from-agent {
      background: rgba(255, 255, 255, 0.02);
    }

    .message-row:hover { filter: brightness(1.15); }

    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .from-human .message-avatar {
      background: var(--accent);
      color: #fff;
    }

    .from-agent .message-avatar {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .from-agent.p0 .message-avatar {
      border-color: var(--p0);
      color: var(--p0);
    }

    .message-body {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .message-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .message-time {
      font-size: 10px;
      color: var(--muted);
    }

    .message-content {
      font-size: 12px;
      color: var(--text);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .from-agent.p0 .message-content { color: #fca5a5; }

    /* Rendered markdown inside message bubbles. marked emits block elements, so
       the container drops pre-wrap and these rules govern spacing/formatting. */
    .message-content { white-space: normal; }
    .message-content > :first-child { margin-top: 0; }
    .message-content > :last-child { margin-bottom: 0; }
    .message-content p { margin: 0 0 4px; }
    .message-content code {
      font-family: inherit;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 11px;
      color: var(--accent);
    }
    .message-content pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      margin: 4px 0;
      overflow-x: auto;
    }
    .message-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 11px;
      white-space: pre;
    }
    .message-content ul, .message-content ol { margin: 4px 0; padding-left: 20px; }
    .message-content li { margin: 1px 0; }
    .message-content blockquote {
      margin: 4px 0;
      padding: 1px 10px;
      border-left: 2px solid var(--border);
      color: var(--muted);
    }
    .message-content a { color: var(--accent); text-decoration: none; }
    .message-content a:hover { text-decoration: underline; }
    .message-content strong { font-weight: 700; color: var(--text); }
    .message-content h1, .message-content h2, .message-content h3,
    .message-content h4, .message-content h5, .message-content h6 {
      font-size: 12px;
      margin: 6px 0 4px;
    }
    .message-content table {
      border-collapse: collapse;
      margin: 4px 0;
    }
    .message-content th, .message-content td {
      border: 1px solid var(--border);
      padding: 2px 6px;
    }

input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      border-radius: 4px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }

    select option { background: var(--bg); }

    /* --msg-input-min: floor height (~4 rows); JS auto-resize grows from here up to max-height. */
    #msg-input  { --msg-input-min: 92px; width: 100%; resize: vertical; min-height: var(--msg-input-min); height: var(--msg-input-min); max-height: 220px; overflow-y: auto; }
    #msg-input:disabled { opacity: 0.4; cursor: not-allowed; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 7px 18px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">S-Deck <span>/ Synapse</span></div>
  <div class="project-name" id="project-name">—</div>
  <div class="dot-label" id="conn-label">connecting…</div>
  <div class="dot" id="conn-dot" style="background: var(--muted); box-shadow: none;"></div>
  <button id="theme-btn" style="background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:inherit;" title="Toggle theme">☀</button>
</header>

<main>
  <!-- Approvals -->
  <div id="approvals-panel">
  </div>

  <!-- Agents -->
  <section id="agents-panel">
    <div class="panel-header">
      <span>Agents</span>
      <button id="purge-btn" title="Delete ended agents with no message or tool history" style="background:none;border:1px solid var(--border);color:var(--muted);font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;font-family:inherit;align-self:auto;transition:border-color 0.15s,color 0.15s;">tidy</button>
    </div>
    <div id="agents-list">
      <div class="empty-state">No agents connected yet.</div>
    </div>
  </section>

  <!-- Messages -->
  <section id="messages-panel">
    <div class="panel-header" id="messages-header">
      <span id="messages-title">Messages</span>
      <span class="header-status-group"><span id="activity-latest-flash"></span><button id="activity-expand" class="activity-toggle" title="Show activity panel" aria-label="Show activity panel"></button></span>
    </div>
    <div id="messages-list">
      <div class="empty-state" id="empty-msgs">No messages yet.</div>
    </div>
    <div id="compose">
      <textarea id="msg-input" rows="4" placeholder="Select an agent… ⌘↵ send · ⌘⇧↵ urgent" disabled></textarea>
    </div>
  </section>

  <!-- Activity feed (tool events) -->
  <section id="activity-panel">
    <div class="panel-header">
      <span>Activity<span id="activity-filter-label" style="text-transform:none;letter-spacing:0;color:var(--accent);"></span></span>
      <button id="activity-collapse" class="activity-toggle" title="Hide activity panel" aria-label="Hide activity panel"></button>
    </div>
    <div id="activity-list">
      <div class="empty-state">No tool activity yet.</div>
    </div>
  </section>
</main>

<!-- Agent config modal -->
<div id="agent-config-backdrop" class="modal-backdrop hidden">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <h2 id="modal-title">Configure Agent <span id="modal-agent-slot" style="color:var(--accent)"></span></h2>
    <div class="modal-field">
      <label for="modal-name">Display Name</label>
      <input id="modal-name" type="text" placeholder="e.g. backend-worker" autocomplete="off" />
    </div>
    <div class="modal-field">
      <label for="modal-model">Model</label>
      <select id="modal-model">
        <option value="">— inherit default —</option>
        <option value="claude-opus-4-8">Opus 4.8</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>
    </div>
    <div class="modal-field">
      <label for="modal-effort">Effort</label>
      <select id="modal-effort">
        <option value="">— inherit default —</option>
        <option value="low">Low</option>
        <option value="normal">Normal</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save" class="primary">Save</button>
    </div>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let agentStatuses    = [];
  let allMessages      = [];
  let pendingApprovals = [];
  let recentEvents     = [];
  let toolMetrics      = [];
  let selectedAgentId  = null;

  // ── Theme ────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  const bright = localStorage.getItem('sdeck-theme') === 'bright';
  if (bright) document.documentElement.classList.add('bright');
  themeBtn.textContent = bright ? '☾' : '☀';
  themeBtn.addEventListener('click', () => {
    const isBright = document.documentElement.classList.toggle('bright');
    localStorage.setItem('sdeck-theme', isBright ? 'bright' : 'dark');
    themeBtn.textContent = isBright ? '☾' : '☀';
  });

  // ── Activity collapse ──────────────────────────────────────────────────────
  // A stored preference ('collapsed'|'expanded') overrides the responsive default;
  // 'auto' (no/unknown value) lets the @media query decide based on width.
  const mainEl   = document.querySelector('main');
  const NARROW   = () => window.matchMedia('(max-width: 1100px)').matches;
  function applyActivityPref() {
    const pref = localStorage.getItem('sdeck-activity'); // 'collapsed' | 'expanded' | null
    mainEl.classList.toggle('activity-collapsed', pref === 'collapsed');
    mainEl.classList.toggle('activity-expanded',  pref === 'expanded');
  }
  applyActivityPref();
  // Decide the panel's CURRENT visible state from classes + the responsive
  // default, then flip to the opposite by setting an explicit preference.
  function activityVisible() {
    if (mainEl.classList.contains('activity-collapsed')) return false;
    if (mainEl.classList.contains('activity-expanded'))  return true;
    return !NARROW(); // no explicit pref → media query decides
  }
  function toggleActivity() {
    localStorage.setItem('sdeck-activity', activityVisible() ? 'collapsed' : 'expanded');
    applyActivityPref();
  }
  document.getElementById('activity-collapse').addEventListener('click', toggleActivity);
  document.getElementById('activity-expand').addEventListener('click', toggleActivity);

  // ── Project info ──────────────────────────────────────────────────────────
  fetch('/api/info').then(r => r.json()).then(({ project, projectId }) => {
    const label = projectId ? `${project}  ·  ${projectId}` : project;
    document.getElementById('project-name').textContent = label;
    document.title = `S-Deck — ${project}`;
  });

  // ── SSE ──────────────────────────────────────────────────────────────────
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');

  function connect() {
    const es = new EventSource('/events');

    es.onopen = () => {
      dot.style.background = 'var(--idle)';
      dot.style.boxShadow  = '0 0 6px var(--idle)';
      label.textContent    = 'live';
    };

    es.onmessage = (e) => {
      const { statuses, messages, approvals, events, metrics } = JSON.parse(e.data);
      agentStatuses    = statuses;
      allMessages      = messages;
      pendingApprovals = approvals ?? [];
      recentEvents     = events ?? [];
      toolMetrics      = metrics ?? [];
      renderAgents();
      renderMessages();
      renderApprovals();
      renderActivity();
    };

    es.onerror = () => {
      dot.style.background = 'var(--error)';
      dot.style.boxShadow  = 'none';
      label.textContent    = 'disconnected — retrying…';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();

  // ── Render approvals ─────────────────────────────────────────────────────
  const approvalsPanel = document.getElementById('approvals-panel');

  function renderApprovals() {
    if (pendingApprovals.length === 0) {
      approvalsPanel.classList.remove('visible');
      approvalsPanel.innerHTML = '';
      return;
    }
    approvalsPanel.classList.add('visible');
    approvalsPanel.innerHTML = pendingApprovals.map(a => `
      <div class="approval-card" data-approval-id="${a.id}">
        <div class="approval-question">⚠ ${esc(a.question)}</div>
        ${a.context ? `<div class="approval-context">${esc(a.context)}</div>` : ''}
        <div class="approval-meta">from ${esc(a.agent_id)} · ${new Date(a.created_at).toLocaleTimeString()}</div>
        <div class="approval-actions">
          <input class="approval-comment" type="text" placeholder="Optional comment…" />
          <button class="btn-approve" data-id="${a.id}">Approve</button>
          <button class="btn-reject" data-id="${a.id}">Reject</button>
        </div>
      </div>
    `).join('');

    approvalsPanel.querySelectorAll('.btn-approve, .btn-reject').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const status = btn.classList.contains('btn-approve') ? 'approved' : 'rejected';
        const comment = btn.closest('.approval-card').querySelector('.approval-comment').value.trim() || null;
        await fetch(`/api/approvals/${id}/resolve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status, comment }),
        });
      });
    });
  }

  // ── Render agents ─────────────────────────────────────────────────────────
  const agentsList = document.getElementById('agents-list');

  function timeAgo(ts) {
    const secs = Math.floor((Date.now() - ts) / 1000);
    if (secs < 5)   return 'just now';
    if (secs < 60)  return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    return `${Math.floor(secs/3600)}h ago`;
  }

  function renderAgents() {
    if (agentStatuses.length === 0) {
      agentsList.innerHTML = '<div class="empty-state">No agents connected yet.</div>';
      return;
    }

    // Auto-select first agent if none selected
    if (!selectedAgentId && agentStatuses.length > 0) {
      selectedAgentId = agentStatuses[0].agent_id;
      // Initial load: ensure the freshly-selected agent's messages start at the bottom.
      requestAnimationFrame(scrollMessagesToBottom);
    }

    agentsList.innerHTML = agentStatuses.map(a => {
      const selected = a.agent_id === selectedAgentId;
      const cardClass = ['agent-card', selected ? 'selected' : ''].filter(Boolean).join(' ');
      const slot = `:${a.slot}`;
      const humanName = a.name && a.name !== a.agent_id ? esc(a.name) : '';
      const hasTmux = !!a.tmux_pane;
      const stateColor = { idle: 'var(--idle)', working: 'var(--working)', blocked: 'var(--blocked)', error: 'var(--error)' }[a.state] ?? 'var(--muted)';
      return `
        <div class="${cardClass}" data-agent-id="${esc(a.agent_id)}" title="click to select">
          <div class="agent-card-row">
            <div class="agent-name">${esc(slot)}${humanName ? `  <span style="color:var(--muted);font-weight:400;">${humanName}</span>` : ''}</div>
            <div style="display:flex;align-items:center;gap:6px;">
              <button class="cfg-btn" data-cfg-id="${esc(a.agent_id)}" title="Configure agent">cfg</button>
              <button class="focus-btn" data-focus-id="${esc(a.agent_id)}" ${hasTmux ? '' : 'disabled'} title="${hasTmux ? 'Focus tmux pane' : 'No tmux pane'}">focus</button>
              <button class="ping-btn" data-ping-id="${esc(a.agent_id)}" ${hasTmux ? '' : 'disabled'} title="${hasTmux ? 'Nudge agent' : 'No tmux pane'}">ping</button>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
            <span style="width:7px;height:7px;border-radius:50%;background:${stateColor};flex-shrink:0;"></span>
            <span style="font-size:11px;color:${stateColor};font-weight:600;">${esc(a.state)}</span>
          </div>
          ${renderMetricChips(a.agent_id)}
        </div>
      `;
    }).join('');

    // Wire card click → select agent (original behavior)
    agentsList.querySelectorAll('.agent-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.ping-btn') || e.target.closest('.focus-btn') || e.target.closest('.cfg-btn')) return;
        selectedAgentId = card.dataset.agentId;
        renderAgents();
        renderMessages();
        renderActivity();
        // Agent switch: leave the scroll position as-is — do not force to bottom.
      });
    });

    // Wire cfg button → open config dialog
    agentsList.querySelectorAll('.cfg-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openAgentConfigDialog(btn.dataset.cfgId);
      });
    });

    agentsList.querySelectorAll('.focus-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const agentId = btn.dataset.focusId;
        const card = btn.closest('.agent-card');
        btn.disabled = true;
        btn.textContent = '…';
        await fetch(`/api/focus/${encodeURIComponent(agentId)}`, { method: 'POST' });
        if (card) {
          card.style.boxShadow = 'inset 3px 0 0 var(--accent), 0 0 0 1px var(--accent)';
          setTimeout(() => { card.style.boxShadow = ''; }, 400);
        }
        setTimeout(() => { btn.disabled = false; btn.textContent = 'focus'; }, 1000);
      });
    });

    agentsList.querySelectorAll('.ping-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const agentId = btn.dataset.pingId;
        btn.disabled = true;
        btn.textContent = '…';
        await fetch(`/api/ping/${encodeURIComponent(agentId)}`, { method: 'POST' });
        setTimeout(() => { btn.disabled = false; btn.textContent = 'ping'; }, 1500);
      });
    });

    updateComposePlaceholder();
  }

  // ── Tool metric chips (per agent card) ─────────────────────────────────────
  function renderMetricChips(agentId) {
    const rows = toolMetrics.filter(m => m.synapse_agent_id === agentId);
    if (!rows.length) return '';
    const chips = rows.slice(0, 6).map(m => {
      const avg = m.avg_ms != null ? ` ${Math.round(m.avg_ms)}ms` : '';
      const cls = m.errors > 0 ? 'metric-chip has-err' : 'metric-chip';
      const errs = m.errors > 0 ? ` ⚠${m.errors}` : '';
      return `<span class="${cls}" title="${esc(m.tool)}: ${m.calls} calls, ${m.errors} errors${m.avg_ms != null ? ', avg ' + Math.round(m.avg_ms) + 'ms, max ' + Math.round(m.max_ms) + 'ms' : ''}"><b>${esc(m.tool)}</b> ${m.calls}${errs}${avg}</span>`;
    }).join('');
    return `<div class="agent-metrics">${chips}</div>`;
  }

  // ── Render activity feed ───────────────────────────────────────────────────
  const activityList  = document.getElementById('activity-list');
  const activityLabel = document.getElementById('activity-filter-label');
  const activityFlash = document.getElementById('activity-latest-flash');

  function summariseEvent(e) {
    let payload = {};
    try { payload = e.payload ? JSON.parse(e.payload) : {}; } catch {}
    let label;
    if (e.event.startsWith('tool:after:')) {
      label = payload.tool ?? e.event.slice('tool:after:'.length);
    } else if (e.event.startsWith('tool:before:')) {
      label = payload.tool ?? e.event.slice('tool:before:'.length);
    } else {
      label = e.event;
    }
    const detail = payload.input ?? payload.prompt ?? payload.message ?? payload.reason ?? '';
    return detail ? `${label}: ${detail}` : label;
  }

  function renderActivity() {
    // Filter to the selected agent if one is chosen; else show the whole swarm.
    const filtered = selectedAgentId
      ? recentEvents.filter(e => e.synapse_agent_id === selectedAgentId)
      : recentEvents;

    const sel = agentStatuses.find(a => a.agent_id === selectedAgentId);
    activityLabel.textContent = sel ? ` · :${sel.slot}` : '';

    // Ticker mirrors the activity list: same filtered view, newest event (index 0 = newest-first)
    const latestFiltered = filtered[0];
    activityFlash.textContent = latestFiltered ? summariseEvent(latestFiltered) : '';

    let activityInnerHtml;
    if (!filtered.length) {
      activityInnerHtml = '<div class="empty-state">No tool activity yet.</div>';
    } else {
      activityInnerHtml = filtered.map(e => {
        let payload = {};
        try { payload = e.payload ? JSON.parse(e.payload) : {}; } catch {}
        const t = new Date(e.timestamp).toLocaleTimeString([], { hour12: false });

        // tool:after:* → status + duration; tool:before:* → skip (noise); other → generic event
        if (e.event.startsWith('tool:after:')) {
          const tool = payload.tool ?? e.event.slice('tool:after:'.length);
          const ok = (payload.status ?? 'ok') !== 'error';
          const detail = esc(payload.input ?? '');
          const dur = e.duration_ms != null ? `${e.duration_ms}ms` : '';
          return `<div id="evt-${e.id}" class="activity-row ${ok ? 'ok' : 'err'}">
            <span class="activity-time">${t}</span>
            <span class="activity-tool">${esc(tool)}</span>
            <span class="activity-detail">${detail}</span>
            <span class="activity-dur">${dur}</span>
          </div>`;
        }
        if (e.event.startsWith('tool:before:')) return ''; // collapse before-events

        // lifecycle / non-tool events (user:prompt, session:*, agent:stop, subagent:*, context:compact)
        const summary = esc(payload.prompt ?? payload.message ?? payload.reason ?? payload.source ?? payload.trigger ?? payload.stopReason ?? payload.agentType ?? '');
        return `<div id="evt-${e.id}" class="activity-row evt">
          <span class="activity-time">${t}</span>
          <span class="activity-tool">${esc(e.event)}</span>
          <span class="activity-detail">${summary}</span>
        </div>`;
      }).join('');
    }

    morphdom(activityList, `<div id="activity-list">${activityInnerHtml}</div>`, { childrenOnly: true });
  }

  function updateComposePlaceholder() {
    const agent = agentStatuses.find(a => a.agent_id === selectedAgentId);
    const label = agent ? `:${agent.slot}` : null;
    msgInput.placeholder = label
      ? `Message to ${label}… ⌘↵ send · ⌘⇧↵ urgent`
      : 'Select an agent… ⌘↵ send · ⌘⇧↵ urgent';
    msgInput.disabled = !selectedAgentId;
  }

  // Re-render agents every 5s so timeAgo and stale state stay current
  setInterval(renderAgents, 5_000);

  // ── Render messages ───────────────────────────────────────────────────────
  const messagesList = document.getElementById('messages-list');

  // Track whether the user has scrolled up to read history. When false (user is
  // at/near the bottom), new messages auto-scroll into view; when true, we leave
  // their reading position alone. Reset to false on initial load and agent switch.
  let userScrolledUp = false;
  messagesList.addEventListener('scroll', () => {
    const nearBottom = messagesList.scrollHeight - messagesList.scrollTop - messagesList.clientHeight < 50;
    userScrolledUp = !nearBottom;
  });

  /** Jump the message list to the bottom and re-enable auto-scroll. */
  function scrollMessagesToBottom() {
    userScrolledUp = false;
    messagesList.scrollTop = messagesList.scrollHeight;
  }

  function renderMessages() {
    const selectedAgent = agentStatuses.find(a => a.agent_id === selectedAgentId);

    const msgs = [...allMessages]
      .filter(m => m.from_id === 'human' || m.to_id === 'human')
      .filter(m => !selectedAgentId || m.from_id === selectedAgentId || m.to_id === selectedAgentId)
      .sort((a, b) => a.created_at - b.created_at);

    let innerHtml;
    if (msgs.length === 0) {
      innerHtml = '<div class="empty-state">No messages for this agent yet.</div>';
    } else {
      innerHtml = msgs.map(m => {
        const isP0      = m.priority === 0;
        const fromHuman = m.from_id === 'human';
        const cls = [isP0 ? 'p0' : '', fromHuman ? 'from-human' : 'from-agent'].filter(Boolean).join(' ');
        const t = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const senderId = fromHuman ? 'human' : m.from_id;
        const agent = agentStatuses.find(a => a.agent_id === senderId);
        const senderLabel = fromHuman ? 'you' : (agent ? `:${agent.slot}${agent.name && agent.name !== agent.agent_id ? ' ' + agent.name : ''}` : senderId);
        const avatarLabel = fromHuman ? 'you' : (agent ? `:${agent.slot}` : senderId.slice(-3));
        const p0badge = isP0 ? ` <span style="font-size:10px;color:var(--p0);font-weight:700;">P0</span>` : '';
        return `
          <div id="msg-${m.id}" class="message-row ${cls}">
            <div class="message-avatar">${esc(avatarLabel)}</div>
            <div class="message-body">
              <div class="message-header">
                ${p0badge}
                <span class="message-time">${t}</span>
              </div>
              <div class="message-content">${renderMarkdown(m.content)}</div>
            </div>
          </div>
        `;
      }).join('');

      if (selectedAgent) {
        const stateColor = { idle: 'var(--idle)', working: 'var(--working)', blocked: 'var(--blocked)', error: 'var(--error)' }[selectedAgent.state] ?? 'var(--muted)';
        const task = selectedAgent.current_task ? esc(selectedAgent.current_task) : '';
        innerHtml += `
          <div id="msg-status-row" style="display:flex;align-items:center;gap:8px;padding:8px 0 2px;opacity:0.6;">
            <div style="flex:1;height:1px;background:var(--border);"></div>
            <span style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);white-space:nowrap;">
              <span style="width:5px;height:5px;border-radius:50%;background:${stateColor};"></span>
              <span style="color:${stateColor};">${esc(selectedAgent.state)}</span>
              ${task ? `<span>·</span><span>${task}</span>` : ''}
            </span>
            <div style="flex:1;height:1px;background:var(--border);"></div>
          </div>
        `;
      }
    }

    // morphdom diffs children in-place — existing nodes stay put, preserving scroll
    // position, text selection, and preventing markdown re-render blink.
    morphdom(messagesList, `<div id="messages-list">${innerHtml}</div>`, { childrenOnly: true });

    if (!userScrolledUp) messagesList.scrollTop = messagesList.scrollHeight;
  }

  // ── Send message ──────────────────────────────────────────────────────────
  const msgInput = document.getElementById('msg-input');

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && !e.shiftKey) { e.preventDefault(); send(5); }
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && e.shiftKey)  { e.preventDefault(); send(0); }
  });
  // Auto-resize floor/ceiling — floor matches the CSS --msg-input-min (~4 rows).
  const MSG_INPUT_MIN = 92;
  const MSG_INPUT_MAX = 220;
  function autosizeMsgInput() {
    msgInput.style.height = MSG_INPUT_MIN + 'px';
    msgInput.style.height = Math.min(Math.max(msgInput.scrollHeight, MSG_INPUT_MIN), MSG_INPUT_MAX) + 'px';
  }
  msgInput.addEventListener('input', autosizeMsgInput);

  async function send(priority = 5) {
    if (!selectedAgentId) return;
    const content = msgInput.value.trim();

    if (!content) return;

    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to_id: selectedAgentId, content, priority }),
    });

    msgInput.value = '';
    msgInput.style.height = MSG_INPUT_MIN + 'px';
    // Scroll to bottom after send — brings user to their just-sent message and
    // re-enables auto-scroll for subsequent incoming replies.
    requestAnimationFrame(() => scrollMessagesToBottom());
  }

  // ── Tidy ended agents ────────────────────────────────────────────────────
  const purgeBtn = document.getElementById('purge-btn');
  purgeBtn.addEventListener('click', async () => {
    purgeBtn.disabled = true;
    purgeBtn.textContent = '…';
    try {
      const res = await fetch('/api/agents/purge', { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { purged } = await res.json();
      purgeBtn.textContent = purged > 0 ? `purged ${purged}` : 'none';
    } catch (err) {
      purgeBtn.textContent = `error: ${err.message}`;
    }
    setTimeout(() => { purgeBtn.disabled = false; purgeBtn.textContent = 'tidy'; }, 2000);
  });

  // ── Utils ─────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Open all rendered links in a new tab safely. Runs on every sanitized node.
  DOMPurify.addHook('afterSanitizeAttributes', (node) => {
    if (node.tagName === 'A' && node.hasAttribute('href')) {
      node.setAttribute('target', '_blank');
      node.setAttribute('rel', 'noopener noreferrer');
    }
  });

  // Render bus message content as GitHub-flavored markdown, then sanitize.
  // marked does NOT sanitize — DOMPurify strips any crafted HTML / javascript: URLs.
  function renderMarkdown(content) {
    const html = marked.parse(String(content ?? ''), { gfm: true, breaks: true });
    return DOMPurify.sanitize(html);
  }

  // ── Agent config dialog ────────────────────────────────────────────────────
  const configBackdrop = document.getElementById('agent-config-backdrop');
  const modalSlot      = document.getElementById('modal-agent-slot');
  const modalName      = document.getElementById('modal-name');
  const modalModel     = document.getElementById('modal-model');
  const modalEffort    = document.getElementById('modal-effort');
  const modalCancel    = document.getElementById('modal-cancel');
  const modalSave      = document.getElementById('modal-save');

  let configAgentId = null;

  function openAgentConfigDialog(agentId) {
    const agent = agentStatuses.find(a => a.agent_id === agentId);
    if (!agent) return;
    configAgentId = agentId;
    modalSlot.textContent = `:${agent.slot}`;
    modalName.value   = agent.name   && agent.name !== agentId ? agent.name  : '';
    modalModel.value  = agent.model  ?? '';
    modalEffort.value = agent.effort ?? '';
    configBackdrop.classList.remove('hidden');
    modalName.focus();
  }

  function closeConfigDialog() {
    configBackdrop.classList.add('hidden');
    configAgentId = null;
  }

  modalCancel.addEventListener('click', closeConfigDialog);
  configBackdrop.addEventListener('click', (e) => { if (e.target === configBackdrop) closeConfigDialog(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeConfigDialog(); });

  modalSave.addEventListener('click', async () => {
    if (!configAgentId) return;
    const body = {
      name:   modalName.value.trim()   || null,
      model:  modalModel.value         || null,
      effort: modalEffort.value        || null,
    };
    modalSave.disabled = true;
    modalSave.textContent = '…';
    await fetch(`/api/agents/${encodeURIComponent(configAgentId)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    modalSave.disabled = false;
    modalSave.textContent = 'Save';
    const savedId = configAgentId;
    closeConfigDialog();
    // Reflect the update locally immediately (SSE will confirm later)
    const agent = agentStatuses.find(a => a.agent_id === savedId);
    if (agent) {
      agent.name   = body.name;
      agent.model  = body.model;
      agent.effort = body.effort;
    }
    renderAgents();
  });
</script>
</body>
</html>
