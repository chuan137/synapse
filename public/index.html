<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S-Deck — Synapse</title>
  <!-- Markdown rendering for bus messages. marked parses, DOMPurify sanitizes
       (marked does NOT sanitize — untrusted agent/operator content is an XSS risk).
       Pinned to major versions so the CDN doesn't drift. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <!-- morphdom: in-place DOM diffing — keeps existing nodes stable across polls. Pinned @2. -->
  <script src="https://cdn.jsdelivr.net/npm/morphdom@2/dist/morphdom-umd.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<header>
  <div class="logo">SYNAPSE-DECK</div>
  <div class="project-name" id="project-name">—</div>
  <span id="conn-status" data-state="disconnected"></span>
  <button id="roles-btn" class="header-btn" style="margin-left:auto" title="View and edit worker roles">Roles</button>
  <button id="theme-btn" class="header-btn" title="Toggle theme">☀</button>
</header>

<main>
  <!-- Approvals -->
  <div id="approvals-panel">
  </div>

  <!-- Agents -->
  <section id="agents-panel">
    <div class="panel-header">
      <span>Agents</span>
      <button id="purge-btn" class="surface-btn" title="Delete ended agents with no message or tool history">tidy</button>
    </div>
    <div id="agents-list">
      <div class="empty-state">No agents connected yet.</div>
    </div>
  </section>

  <!-- Messages / Plan -->
  <section id="messages-panel">
    <div class="panel-header" id="messages-header">
      <div class="panel-tabs">
        <button id="tab-messages" class="panel-tab active">Messages</button>
        <button id="tab-plan" class="panel-tab">Plan</button>
      </div>
      <span class="header-status-group"><span id="activity-latest-flash"></span><button id="activity-expand" class="activity-toggle" title="Show activity panel" aria-label="Show activity panel"></button></span>
    </div>
    <div id="messages-list">
      <div class="empty-state" id="empty-msgs">No messages yet.</div>
    </div>
    <div id="msg-status-row" style="display:none;">
      <div class="msg-status-content">
        <span class="msg-status-dot" id="msg-status-dot"></span>
        <span class="msg-status-state" id="msg-status-state"></span>
        <span class="msg-status-sep" id="msg-status-sep" style="display:none;">·</span>
        <span class="msg-status-task" id="msg-status-task"></span>
      </div>
    </div>
    <div id="plan-content" style="display:none;">
      <div id="plan-rendered"></div>
    </div>
    <div id="compose">
      <textarea id="msg-input" rows="4" placeholder="Select an agent… ↵ send · ⇧↵ newline · ⌥↵ urgent" disabled></textarea>
    </div>
  </section>

  <!-- Events / Activities right panel -->
  <section id="activity-panel">
    <div class="panel-header">
      <div class="panel-tabs">
        <button id="tab-events" class="panel-tab active">Events</button>
        <button id="tab-tasks" class="panel-tab">Tasks</button>
        <button id="tab-eval" class="panel-tab">Eval</button>
      </div>
      <button id="activity-collapse" class="activity-toggle" title="Hide panel" aria-label="Hide panel"></button>
    </div>
    <div id="activity-list">
      <div class="empty-state">No tool activity yet.</div>
    </div>
    <div id="task-list" style="display:none;">
      <div class="empty-state">No tasks recorded yet for this agent.</div>
    </div>
    <div id="eval-panel" style="display:none; overflow-y: auto; flex: 1; padding: 8px;">
      <div id="eval-content"></div>
    </div>
  </section>
</main>

<!-- Agent config modal -->
<div id="agent-config-backdrop" class="modal-backdrop hidden">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <h2 id="modal-title">Configure Agent <span id="modal-agent-slot" style="color:var(--accent)"></span></h2>
    <div class="modal-field">
      <label for="modal-model">Model</label>
      <select id="modal-model">
        <option value="">— inherit default —</option>
        <option value="claude-opus-4-8">Opus 4.8</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>
    </div>
    <div class="modal-field">
      <label for="modal-effort">Effort</label>
      <select id="modal-effort">
        <option value="">— inherit default —</option>
        <option value="low">Low</option>
        <option value="normal">Normal</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save" class="primary">Save</button>
    </div>
  </div>
</div>

<!-- Agent system prompt modal -->
<div id="agent-prompt-backdrop" class="modal-backdrop hidden">
  <div class="modal prompt-modal" role="dialog" aria-modal="true" aria-labelledby="prompt-title">
    <div class="prompt-modal-header">
      <h2 id="prompt-title">Instructions <span id="prompt-agent-slot" style="color:var(--accent)"></span> <span id="prompt-role-badge" class="prompt-role-badge"></span></h2>
      <button id="prompt-close" class="prompt-close-btn" title="Close">✕</button>
    </div>
    <div class="prompt-sections">
      <div class="prompt-section" id="prompt-resolved-section" style="display:none;">
        <div class="prompt-section-label">System prompt</div>
        <div id="prompt-resolved" class="prompt-md"></div>
      </div>
      <div class="prompt-section" id="prompt-boot-section" style="display:none;">
        <div class="prompt-section-label">Boot task</div>
        <div id="prompt-boot-task" class="prompt-md"></div>
      </div>
    </div>
  </div>
</div>

<!-- Roles CRUD modal -->
<div id="roles-backdrop" class="modal-backdrop hidden">
  <div class="modal roles-modal" role="dialog" aria-modal="true" aria-labelledby="roles-title">
    <h2 id="roles-title">Worker Roles</h2>
    <div class="roles-body">
      <div class="roles-list-pane">
        <button id="roles-new-btn">+ New role</button>
        <div id="roles-list"></div>
      </div>
      <div class="roles-editor-pane">
        <div id="roles-editor-header"><span class="muted">Select a role or create a new one.</span></div>
        <textarea id="roles-source" spellcheck="false" disabled placeholder="Role markdown (front-matter + body)…"></textarea>
        <div id="roles-error"></div>
        <div class="modal-actions">
          <button id="roles-delete" class="danger" disabled>Delete</button>
          <button id="roles-cancel">Cancel</button>
          <button id="roles-save" class="primary" disabled>Save</button>
        </div>
      </div>
    </div>
  </div>
</div>


<!-- Diff modal -->
<div id="diff-backdrop" class="modal-backdrop hidden">
  <div class="modal modal-wide" role="dialog" aria-modal="true" aria-labelledby="diff-modal-title">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h2 id="diff-modal-title" style="font-family:inherit;"></h2>
      <button id="diff-modal-close" style="background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:4px;cursor:pointer;font-family:inherit;align-self:auto;">✕</button>
    </div>
    <pre id="diff-modal-pre" class="diff-modal-pre"></pre>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
