<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#1A1F2C"/>
  <!-- dendrite arms -->
  <g stroke="#ffffff" stroke-opacity=".55" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="32" y1="32" x2="10" y2="10"/>
    <line x1="32" y1="32" x2="54" y2="10"/>
    <line x1="32" y1="32" x2="10" y2="54"/>
    <line x1="32" y1="32" x2="54" y2="54"/>
    <line x1="32" y1="32" x2="32" y2="8"/>
    <line x1="32" y1="32" x2="8" y2="32"/>
    <!-- axon with synaptic gap -->
    <line x1="32" y1="32" x2="52" y2="32"/>
  </g>
  <!-- axon terminal bulb -->
  <circle cx="57" cy="32" r="3.5" fill="#00F5FF" fill-opacity=".7"/>
  <!-- synaptic gap spark -->
  <circle cx="53" cy="32" r="1.5" fill="#00F5FF"/>
  <!-- cell body -->
  <circle cx="32" cy="32" r="7" fill="#1A1F2C" stroke="#00F5FF" stroke-width="2"/>
  <circle cx="32" cy="32" r="3.5" fill="#00F5FF"/>
</svg>
